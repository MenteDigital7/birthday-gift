name: Build y Deploy a GitHub Pages

on:
  push:
    branches: ["main"]

# Permisos necesarios para que GitHub Actions pueda publicar en tu cuenta
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # TRABAJO 1: COMPILACIÓN (En este caso, preparar los archivos estáticos)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Subir artefacto para el despliegue
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Sube todos tus archivos actuales (html, css, js, mp3)

  # TRABAJO 2: DESPLIEGUE (DEPLOY)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # No empieza hasta que el build termine con éxito
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
